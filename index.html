<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & MD Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }

        .glass { backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .light .glass { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.1); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }

        #markdown-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .markdown-body { background: transparent !important; padding: 32px; min-height: 100%; }

        .dark .markdown-body { color: #c9d1d9 !important; }
        .light .markdown-body { color: #1f2328 !important; }

        .dark .markdown-body table tr { background-color: #0d1117 !important; border-top: 1px solid #30363d !important; }
        .dark .markdown-body table tr:nth-child(2n) { background-color: #161b22 !important; }
        .dark .markdown-body table th, .dark .markdown-body table td { border: 1px solid #30363d !important; color: #c9d1d9 !important; }
        .dark .markdown-body blockquote { color: #8b949e !important; border-left: .25em solid #30363d !important; }
        .dark .markdown-body h1, .dark .markdown-body h2, .dark .markdown-body h3, .dark .markdown-body h4, .dark .markdown-body h5, .dark .markdown-body h6 { color: #f0f6fc !important; border-bottom-color: #30363d !important; }
        .dark .markdown-body a { color: #58a6ff !important; }
        .dark .markdown-body code { background-color: rgba(110,118,129,0.4) !important; color: #f0f6fc !important; padding: 0.2em 0.4em !important; border-radius: 6px !important; font-size: 85% !important; }
        .dark .markdown-body pre { background-color: #161b22 !important; border: 1px solid #30363d !important; border-radius: 6px !important; padding: 16px !important; }
        .dark .markdown-body pre code { background-color: transparent !important; padding: 0 !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0d1117] text-slate-900 dark:text-slate-200 min-h-screen overflow-hidden">

    <!-- Top Controls (Theme & GitHub) -->
    <div id="top-controls" class="fixed top-6 right-6 z-[60] flex items-center gap-3 transition-opacity duration-300">
        <a href="https://github.com/42inshin/htmlViewer" target="_blank" id="github-btn" class="glass p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-all shadow-xl active:scale-95 group" title="View on GitHub">
            <img src="assets/github.svg" class="w-6 h-6 opacity-60 dark:opacity-80 dark:invert group-hover:opacity-100 transition-all" alt="GitHub">
        </a>
        <button onclick="toggleTheme()" id="theme-btn" class="glass p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-all shadow-xl active:scale-95" title="테마 변경">
        </button>
    </div>

    <!-- Home UI -->
    <div id="home-view" class="flex flex-col items-center justify-center min-h-screen p-6 transition-all duration-500">
        <div class="max-w-2xl w-full space-y-10">
            <div class="text-center space-y-6">
                <!-- Logo -->
                <div class="relative w-20 h-20 mx-auto group">
                    <div class="absolute inset-0 bg-blue-500/20 blur-xl rounded-full group-hover:bg-blue-500/40 transition-all duration-500"></div>
                    <div class="relative w-full h-full glass rounded-2xl flex items-center justify-center border-white/20 group-hover:scale-110 group-hover:border-blue-400/50 transition-all duration-500 shadow-2xl">
                        <div class="w-0 h-0 border-t-[12px] border-t-transparent border-l-[20px] border-l-blue-400 border-b-[12px] border-b-transparent ml-1 drop-shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div>
                        <div class="absolute top-2 left-2 flex gap-1">
                            <div class="w-1.5 h-1.5 rounded-full bg-red-500/50"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-amber-500/50"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500/50"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <h1 class="text-5xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                        HTML & MD Viewer
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-lg font-medium">GitHub 발표 자료와 문서를 즉시 확인하세요.</p>
                </div>
            </div>

            <!-- Input Section -->
            <div class="glass p-2 rounded-2xl flex items-center gap-2 focus-within:ring-2 ring-blue-500/50 transition-all">
                <input type="text" id="url-input"
                    placeholder="GitHub URL (HTML 또는 MD)"
                    class="bg-transparent border-none w-full p-4 outline-none text-lg text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500">
                <button onclick="handleView()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-semibold transition-all flex items-center gap-2 whitespace-nowrap">
                    <i data-lucide="play" class="w-5 h-5"></i>
                    열기
                </button>
            </div>

            <!-- Recent History -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="history" class="w-4 h-4"></i>
                        최근 본 항목
                    </h2>
                    <button onclick="clearHistory()" class="text-xs text-slate-400 hover:text-red-500 transition-colors">전체 삭제</button>
                </div>
                <div id="history-list" class="grid gap-3 max-h-[350px] overflow-y-auto overflow-x-hidden custom-scrollbar pr-2">
                </div>
            </div>
        </div>
    </div>

    <!-- Viewer UI -->
    <div id="viewer-view" class="fixed inset-0 hidden flex flex-col transition-all duration-300">
        <!-- Controls -->
        <div class="absolute top-4 left-4 z-50 flex gap-2 opacity-10 transition-opacity duration-300 hover:opacity-100">
            <button onclick="exitViewer()" title="홈으로" class="glass bg-white/20 dark:bg-black/20 p-3 rounded-full hover:bg-white/40 dark:hover:bg-black/40 transition-colors shadow-2xl">
                <i data-lucide="home" class="w-6 h-6"></i>
            </button>
            <button onclick="refreshView()" title="새로고침" class="glass bg-white/20 dark:bg-black/20 p-3 rounded-full hover:bg-white/40 dark:hover:bg-black/40 transition-colors shadow-2xl">
                <i data-lucide="refresh-cw" class="w-6 h-6"></i>
            </button>
            <button onclick="copyShareLink()" title="공유 링크 복사" class="glass bg-white/20 dark:bg-black/20 p-3 rounded-full hover:bg-white/40 dark:hover:bg-black/40 transition-colors shadow-2xl">
                <i data-lucide="share-2" class="w-6 h-6"></i>
            </button>
        </div>

        <iframe id="presentation-frame" class="hidden w-full h-full border-none bg-white"></iframe>

        <div id="markdown-viewer" class="hidden w-full h-full overflow-y-auto custom-scrollbar">
            <div id="markdown-content" class="markdown-body"></div>
        </div>

        <div id="loading" class="hidden absolute inset-0 flex items-center justify-center bg-black/10 dark:bg-black/40 z-40">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-sm font-medium opacity-0 pointer-events-none transition-all duration-300 z-[100] bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl">
        복사되었습니다!
    </div>

    <script>
        const html = document.documentElement;
        const body = document.body;
        const themeBtn = document.getElementById('theme-btn');
        const topControls = document.getElementById('top-controls');
        const urlInput = document.getElementById('url-input');
        const historyList = document.getElementById('history-list');
        const homeView = document.getElementById('home-view');
        const viewerView = document.getElementById('viewer-view');
        const iframe = document.getElementById('presentation-frame');
        const mdViewer = document.getElementById('markdown-viewer');
        const mdContent = document.getElementById('markdown-content');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');

        let currentUrl = '';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
        }

        function toggleTheme() {
            const newTheme = html.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                html.classList.add('dark');
                html.classList.remove('light');
                body.setAttribute('data-color-mode', 'dark');
                body.setAttribute('data-dark-theme', 'dark');
                mdViewer.style.backgroundColor = '#0d1117';
                themeBtn.innerHTML = '<i data-lucide="sun" class="w-6 h-6 text-white"></i>';
            } else {
                html.classList.add('light');
                html.classList.remove('dark');
                body.setAttribute('data-color-mode', 'light');
                body.setAttribute('data-light-theme', 'light');
                mdViewer.style.backgroundColor = '#ffffff';
                themeBtn.innerHTML = '<i data-lucide="moon" class="w-6 h-6 text-slate-600"></i>';
            }
            lucide.createIcons();
        }

        function convertToRaw(url) {
            const gitHubRegExp = /github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/;
            const match = url.match(gitHubRegExp);
            if (match) {
                const [_, user, repo, branch, path] = match;
                return `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${path}`;
            }
            return url;
        }

        function convertToGithack(url) {
            const gitHubRegExp = /github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/;
            const match = url.match(gitHubRegExp);
            if (match) {
                const [_, user, repo, branch, path] = match;
                return `https://raw.githack.com/${user}/${repo}/${branch}/${path}`;
            }
            return url;
        }

        async function handleView(targetUrl) {
            const url = targetUrl || urlInput.value.trim();

            // 1. Validation
            if (!url) {
                showToast('URL을 입력해주세요.');
                return;
            }
            if (!url.startsWith('http')) {
                showToast('유효한 웹 주소(http/https)를 입력해주세요.');
                return;
            }

            // 2. File Type Check
            const lowerUrl = url.toLowerCase().split('?')[0];
            const isHtml = lowerUrl.endsWith('.html') || lowerUrl.endsWith('.htm');
            const isMd = lowerUrl.endsWith('.md');

            if (!isHtml && !isMd) {
                showToast('지원하지 않는 파일입니다. (.html 또는 .md 파일 필요)');
                return;
            }

            // 3. Optimization Notice
            if (!url.includes('github.com')) {
                showToast('GitHub 주소만 지원합니다.');
                return;
            }

            currentUrl = url;
            currentUrl = url;
            saveToHistory(url);

            homeView.classList.add('opacity-0', 'scale-95');
            setTimeout(async () => {
                homeView.classList.add('hidden');
                viewerView.classList.remove('hidden');
                window.focus();

                // Hide GitHub button in all viewer modes
                document.getElementById('github-btn').classList.add('hidden');

                if (url.toLowerCase().endsWith('.md')) {
                    topControls.classList.remove('hidden');
                    await renderMarkdown(url);
                } else {
                    topControls.classList.add('hidden');
                    showHtml(url);
                }
                setTimeout(() => viewerView.classList.add('opacity-100'), 50);
            }, 300);
        }

        function showHtml(url) {
            mdViewer.classList.add('hidden');
            iframe.classList.remove('hidden');
            iframe.src = convertToGithack(url);
        }

        async function renderMarkdown(url) {
            iframe.classList.add('hidden');
            mdViewer.classList.remove('hidden');
            mdContent.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                const rawUrl = convertToRaw(url);
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('파일 로드 실패');
                const text = await response.text();
                mdContent.innerHTML = marked.parse(text);
                mdViewer.scrollTop = 0;
            } catch (e) {
                mdContent.innerHTML = `<div class="text-red-400 p-8 text-center">에러: ${e.message}</div>`;
            } finally {
                loading.classList.add('hidden');
                lucide.createIcons(); // MD 내 아이콘 렌더링 대비
            }
        }

        function exitViewer() {
            // Restore buttons when returning to home
            topControls.classList.remove('hidden');
            document.getElementById('github-btn').classList.remove('hidden');

            viewerView.classList.add('hidden');
            homeView.classList.remove('hidden');
            setTimeout(() => homeView.classList.remove('opacity-0', 'scale-95'), 50);
            iframe.src = '';
            mdContent.innerHTML = '';
            renderHistory();
        }

        function refreshView() { handleView(currentUrl); }

        function copyShareLink(targetUrl) {
            const url = targetUrl || currentUrl;
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?url=${encodeURIComponent(url)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('공유 링크가 복사되었습니다!');
            });
        }

        function copyRawUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast('원본 URL이 복사되었습니다!'));
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('opacity-100', '-translate-y-2');
            setTimeout(() => toast.classList.remove('opacity-100', '-translate-y-2'), 2000);
        }

        function saveToHistory(url) {
            let history = JSON.parse(localStorage.getItem('viewer_history') || '[]');
            history = history.filter(item => item.url !== url);
            let rawTitle = url.split('/').pop().split('?')[0] || url;
            let decodedTitle = rawTitle;
            try { decodedTitle = decodeURIComponent(rawTitle); } catch (e) {}

            history.unshift({ url, timestamp: new Date().getTime(), title: decodedTitle });
            history = history.slice(0, 15);
            localStorage.setItem('viewer_history', JSON.stringify(history));
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('viewer_history') || '[]');
            if (history.length === 0) {
                historyList.innerHTML = `<p class="text-center py-8 text-slate-500 text-sm italic">기록이 없습니다.</p>`;
                return;
            }

            historyList.innerHTML = history.map(item => {
                const isMd = item.url.toLowerCase().endsWith('.md');
                return `
                <div class="glass p-4 rounded-xl flex items-center justify-between group hover:bg-white/5 transition-all">
                    <div class="flex-1 min-w-0 mr-4 cursor-pointer" onclick="handleView('${item.url}')">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${isMd ? 'file-text' : 'layout'}" class="w-4 h-4 ${isMd ? 'text-emerald-500' : 'text-blue-500'}"></i>
                            <h3 class="font-medium break-all line-clamp-1 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${item.title}</h3>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 break-all line-clamp-2 pl-6">${item.url}</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="copyShareLink('${item.url}')" title="공유 링크 복사" class="p-2 text-slate-400 hover:text-blue-500 rounded-lg transition-all">
                            <i data-lucide="share-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="copyRawUrl('${item.url}')" title="원본 URL 복사" class="p-2 text-slate-400 hover:text-emerald-500 rounded-lg transition-all">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <a href="${item.url}" target="_blank" title="GitHub에서 열기" class="p-2 text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg transition-all">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                        <button onclick="removeFromHistory('${item.url}')" title="기록 삭제" class="p-2 text-slate-400 hover:text-red-500 rounded-lg transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        function removeFromHistory(url) {
            let history = JSON.parse(localStorage.getItem('viewer_history') || '[]');
            history = history.filter(item => item.url !== url);
            localStorage.setItem('viewer_history', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            if(confirm('모든 기록을 삭제하시겠습니까?')) {
                localStorage.removeItem('viewer_history');
                renderHistory();
            }
        }

        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleView(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !viewerView.classList.contains('hidden')) exitViewer();
        });

        initTheme();
        renderHistory();

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const sharedUrl = params.get('url');
            if (sharedUrl) {
                urlInput.value = sharedUrl;
                handleView(sharedUrl);
            }
            lucide.createIcons(); // Final check for icons
        });
    </script>
</body>
</html>
